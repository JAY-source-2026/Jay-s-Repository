<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강아지상 고양이상 테스트</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f7f2;
            --surface: #ffffff;
            --surface-soft: #eef3ea;
            --ink: #20231f;
            --muted: #687062;
            --line: #d9dfd1;
            --dog: #e97c45;
            --cat: #4f7d95;
            --accent: #236c5f;
            --accent-dark: #174a43;
            --shadow: 0 18px 48px rgba(32, 35, 31, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--ink);
            background:
                linear-gradient(120deg, rgba(233, 124, 69, 0.12), transparent 34%),
                linear-gradient(220deg, rgba(79, 125, 149, 0.16), transparent 36%),
                var(--bg);
            font-family: "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
        }

        button,
        input {
            font: inherit;
        }

        button {
            border: 0;
        }

        .app {
            width: min(1120px, 100%);
            margin: 0 auto;
            padding: 32px 20px 48px;
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 0.9fr) minmax(320px, 1.1fr);
            gap: 28px;
            align-items: stretch;
            min-height: calc(100vh - 80px);
        }

        .intro {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 24px 0;
        }

        .eyebrow {
            width: fit-content;
            margin: 0 0 16px;
            padding: 8px 12px;
            border: 1px solid rgba(35, 108, 95, 0.22);
            border-radius: 999px;
            color: var(--accent-dark);
            background: rgba(255, 255, 255, 0.58);
            font-size: 14px;
            font-weight: 700;
        }

        h1 {
            margin: 0;
            font-size: clamp(44px, 8vw, 86px);
            line-height: 0.98;
            letter-spacing: 0;
        }

        .subtitle {
            max-width: 560px;
            margin: 22px 0 0;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.65;
            word-break: keep-all;
        }

        .animal-strip {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-top: 30px;
        }

        .animal-tile {
            min-height: 132px;
            padding: 20px;
            border: 1px solid rgba(32, 35, 31, 0.1);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.68);
            overflow: hidden;
        }

        .animal-emoji {
            display: block;
            margin-bottom: 10px;
            font-size: 42px;
        }

        .animal-tile strong {
            display: block;
            margin-bottom: 6px;
            font-size: 18px;
        }

        .animal-tile span {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.45;
        }

        .tester {
            align-self: center;
            width: 100%;
            padding: 22px;
            border: 1px solid rgba(32, 35, 31, 0.1);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.82);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .preview-wrap {
            position: relative;
            display: grid;
            place-items: center;
            width: 100%;
            aspect-ratio: 4 / 3;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface-soft);
            overflow: hidden;
        }

        .placeholder {
            padding: 24px;
            color: var(--muted);
            text-align: center;
            line-height: 1.6;
            word-break: keep-all;
        }

        #preview,
        #webcam {
            display: none;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #webcam canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 14px;
        }

        .action {
            min-height: 48px;
            padding: 0 14px;
            border-radius: 8px;
            color: #ffffff;
            background: var(--accent);
            cursor: pointer;
            font-weight: 800;
            transition: transform 0.18s ease, background 0.18s ease;
            white-space: nowrap;
        }

        .action:hover {
            background: var(--accent-dark);
        }

        .action:active {
            transform: translateY(1px);
        }

        .action.secondary {
            color: var(--ink);
            background: #e8ece1;
        }

        .action.secondary:hover {
            background: #dce3d3;
        }

        .file-input {
            position: absolute;
            inline-size: 1px;
            block-size: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .status {
            min-height: 24px;
            margin: 14px 0 0;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .result {
            display: grid;
            gap: 14px;
            margin-top: 18px;
        }

        .result-card {
            padding: 18px;
            border-radius: 8px;
            background: var(--surface);
            border: 1px solid var(--line);
        }

        .result-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .result-title strong {
            font-size: 24px;
        }

        .score {
            color: var(--accent-dark);
            font-weight: 900;
        }

        .bars {
            display: grid;
            gap: 10px;
        }

        .bar-row {
            display: grid;
            grid-template-columns: 88px minmax(0, 1fr) 54px;
            gap: 10px;
            align-items: center;
            font-size: 14px;
        }

        .bar-track {
            height: 12px;
            border-radius: 999px;
            background: #edf0e8;
            overflow: hidden;
        }

        .bar-fill {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            transition: width 0.35s ease;
        }

        .bar-fill.dog {
            background: var(--dog);
        }

        .bar-fill.cat {
            background: var(--cat);
        }

        .note {
            margin: 12px 0 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.55;
        }

        @media (max-width: 820px) {
            .app {
                padding: 22px 14px 36px;
            }

            .hero {
                grid-template-columns: 1fr;
                min-height: auto;
            }

            .intro {
                padding: 8px 0 0;
            }

            .subtitle {
                font-size: 16px;
            }

            .tester {
                padding: 14px;
            }
        }

        @media (max-width: 520px) {
            .animal-strip,
            .controls {
                grid-template-columns: 1fr;
            }

            .bar-row {
                grid-template-columns: 70px minmax(0, 1fr) 48px;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <section class="hero">
            <div class="intro">
                <p class="eyebrow">AI 동물상 테스트</p>
                <h1>나는<br>강아지상일까<br>고양이상일까?</h1>
                <p class="subtitle">
                    사진을 올리거나 웹캠을 켜면 직접 학습한 Teachable Machine 모델이 얼굴 분위기를 강아지상과 고양이상으로 분석합니다.
                </p>
                <div class="animal-strip" aria-label="결과 유형">
                    <div class="animal-tile">
                        <span class="animal-emoji" aria-hidden="true">🐶</span>
                        <strong>강아지상</strong>
                        <span>밝고 다정한 인상, 둥근 분위기가 돋보이는 타입</span>
                    </div>
                    <div class="animal-tile">
                        <span class="animal-emoji" aria-hidden="true">🐱</span>
                        <strong>고양이상</strong>
                        <span>차분하고 또렷한 인상, 시크한 분위기가 살아나는 타입</span>
                    </div>
                </div>
            </div>

            <section class="tester" aria-label="동물상 테스트">
                <div class="preview-wrap">
                    <p class="placeholder" id="placeholder">사진을 선택하거나 웹캠을 시작해 주세요.</p>
                    <img id="preview" alt="선택한 테스트 이미지">
                    <div id="webcam"></div>
                </div>

                <div class="controls">
                    <button class="action" type="button" id="uploadButton">사진 선택</button>
                    <button class="action secondary" type="button" id="webcamButton">웹캠 시작</button>
                </div>
                <input class="file-input" type="file" id="imageInput" accept="image/*">

                <p class="status" id="status">모델을 불러오는 중입니다.</p>

                <div class="result" id="result" hidden>
                    <div class="result-card">
                        <div class="result-title">
                            <strong id="resultName">결과 대기 중</strong>
                            <span class="score" id="resultScore">0%</span>
                        </div>
                        <div class="bars" id="bars"></div>
                        <p class="note" id="resultNote">분석 결과는 재미용입니다. 정면 얼굴이 잘 보이는 밝은 사진일수록 결과가 안정적입니다.</p>
                    </div>
                </div>
            </section>
        </section>
    </main>

    <script>
        const MODEL_URL = "https://teachablemachine.withgoogle.com/models/fi9XbnAFu/";
        const modelURL = MODEL_URL + "model.json";
        const metadataURL = MODEL_URL + "metadata.json";

        const statusEl = document.getElementById("status");
        const uploadButton = document.getElementById("uploadButton");
        const webcamButton = document.getElementById("webcamButton");
        const imageInput = document.getElementById("imageInput");
        const preview = document.getElementById("preview");
        const webcamContainer = document.getElementById("webcam");
        const placeholder = document.getElementById("placeholder");
        const result = document.getElementById("result");
        const resultName = document.getElementById("resultName");
        const resultScore = document.getElementById("resultScore");
        const resultNote = document.getElementById("resultNote");
        const bars = document.getElementById("bars");

        let model;
        let webcam;
        let maxPredictions = 0;
        let isWebcamRunning = false;

        const typeCopy = {
            dog: {
                label: "강아지상",
                emoji: "🐶",
                note: "따뜻하고 친근한 분위기가 강하게 잡혔어요."
            },
            cat: {
                label: "고양이상",
                emoji: "🐱",
                note: "또렷하고 차분한 분위기가 강하게 잡혔어요."
            }
        };

        init();

        async function init() {
            setBusy(true, "모델을 불러오는 중입니다.");

            try {
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();
                setBusy(false, "준비 완료. 사진을 선택하거나 웹캠을 시작해 주세요.");
            } catch (error) {
                console.error(error);
                setBusy(false, "모델을 불러오지 못했습니다. 인터넷 연결 또는 모델 공개 상태를 확인해 주세요.");
            }
        }

        uploadButton.addEventListener("click", () => imageInput.click());

        imageInput.addEventListener("change", async (event) => {
            const file = event.target.files && event.target.files[0];
            if (!file) return;

            stopWebcam();

            const imageURL = URL.createObjectURL(file);
            preview.onload = async () => {
                URL.revokeObjectURL(imageURL);
                await predict(preview);
            };
            preview.src = imageURL;
            showPreview("image");
            setBusy(true, "사진을 분석하는 중입니다.");
        });

        webcamButton.addEventListener("click", async () => {
            if (isWebcamRunning) {
                stopWebcam();
                showPreview("empty");
                setBusy(false, "웹캠을 멈췄습니다. 사진을 선택하거나 다시 시작해 주세요.");
                return;
            }

            if (!model) {
                statusEl.textContent = "모델 로딩이 끝난 뒤 다시 시도해 주세요.";
                return;
            }

            try {
                webcam = new tmImage.Webcam(420, 315, true);
                await webcam.setup();
                await webcam.play();
                webcamContainer.innerHTML = "";
                webcamContainer.appendChild(webcam.canvas);
                isWebcamRunning = true;
                webcamButton.textContent = "웹캠 중지";
                showPreview("webcam");
                window.requestAnimationFrame(loop);
            } catch (error) {
                console.error(error);
                setBusy(false, "웹캠을 사용할 수 없습니다. 브라우저 권한을 확인해 주세요.");
            }
        });

        async function loop() {
            if (!isWebcamRunning || !webcam) return;

            webcam.update();
            await predict(webcam.canvas, true);
            window.requestAnimationFrame(loop);
        }

        async function predict(target, fromWebcam = false) {
            if (!model) {
                statusEl.textContent = "모델을 아직 불러오는 중입니다.";
                return;
            }

            try {
                const predictions = await model.predict(target);
                renderPredictions(predictions);
                setBusy(false, fromWebcam ? "실시간 분석 중입니다." : "분석이 완료되었습니다.");
            } catch (error) {
                console.error(error);
                setBusy(false, "분석 중 오류가 발생했습니다. 다른 사진으로 다시 시도해 주세요.");
            }
        }

        function renderPredictions(predictions) {
            const normalized = predictions
                .map((item) => ({
                    className: item.className,
                    probability: item.probability,
                    type: detectType(item.className)
                }))
                .sort((a, b) => b.probability - a.probability);

            const dogPrediction = normalized.find((item) => item.type === "dog");
            const catPrediction = normalized.find((item) => item.type === "cat");
            const top = normalized[0];
            const topType = top.type || (dogPrediction && catPrediction
                ? (dogPrediction.probability >= catPrediction.probability ? "dog" : "cat")
                : "dog");
            const topCopy = typeCopy[topType];

            result.hidden = false;
            resultName.textContent = `${topCopy.emoji} ${topCopy.label}`;
            resultScore.textContent = `${Math.round(top.probability * 100)}%`;
            resultNote.textContent = topCopy.note;

            bars.innerHTML = "";
            const displayItems = buildDisplayItems(normalized, dogPrediction, catPrediction);
            displayItems.forEach((item) => {
                const row = document.createElement("div");
                row.className = "bar-row";
                const label = document.createElement("span");
                label.textContent = item.label;
                const track = document.createElement("div");
                track.className = "bar-track";
                const fill = document.createElement("div");
                fill.className = `bar-fill ${item.type}`;
                fill.style.width = `${Math.round(item.probability * 100)}%`;
                const value = document.createElement("strong");
                value.textContent = `${Math.round(item.probability * 100)}%`;

                track.appendChild(fill);
                row.append(label, track, value);
                bars.appendChild(row);
            });
        }

        function detectType(className) {
            const text = className.toLowerCase();
            if (text.includes("dog") || text.includes("puppy") || text.includes("강아지") || text.includes("개")) {
                return "dog";
            }
            if (text.includes("cat") || text.includes("kitty") || text.includes("고양이")) {
                return "cat";
            }
            return "";
        }

        function buildDisplayItems(normalized, dogPrediction, catPrediction) {
            if (dogPrediction && catPrediction) {
                return [
                    { label: "강아지상", type: "dog", probability: dogPrediction.probability },
                    { label: "고양이상", type: "cat", probability: catPrediction.probability }
                ];
            }

            return normalized.slice(0, Math.min(maxPredictions, 2)).map((item, index) => ({
                label: item.type ? typeCopy[item.type].label : item.className,
                type: item.type || (index === 0 ? "dog" : "cat"),
                probability: item.probability
            }));
        }

        function showPreview(mode) {
            placeholder.style.display = mode === "empty" ? "block" : "none";
            preview.style.display = mode === "image" ? "block" : "none";
            webcamContainer.style.display = mode === "webcam" ? "block" : "none";
        }

        function stopWebcam() {
            if (webcam) {
                webcam.stop();
            }
            webcam = null;
            isWebcamRunning = false;
            webcamButton.textContent = "웹캠 시작";
            webcamContainer.innerHTML = "";
        }

        function setBusy(isBusy, message) {
            uploadButton.disabled = isBusy && !model;
            webcamButton.disabled = isBusy && !model;
            statusEl.textContent = message;
        }
    </script>
</body>
</html>
