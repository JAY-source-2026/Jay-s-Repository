<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>귀염숭이 페이지</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --btn-bg: #eeeeee;
            --btn-text: #333333;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #f0f0f0;
            --btn-bg: #333333;
            --btn-text: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .toggle-btn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 25px;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            transition: transform 0.2s, background-color 0.3s;
        }

        .toggle-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>나는 아빠의 귀염숭이 안녕</h1>
        <!-- 귀여운 아기 이미지 (Unsplash 무료 이미지 사용) -->
        <img src="https://images.unsplash.com/photo-1519689680058-324335c77eba?auto=format&fit=crop&w=500&q=80" alt="Cute Baby">
        <br>
        <button class="toggle-btn" onclick="toggleTheme()">다크 모드로 전환</button>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const btn = document.querySelector('.toggle-btn');
            const currentTheme = body.getAttribute('data-theme');
            
            if (currentTheme === 'dark') {
                body.removeAttribute('data-theme');
                btn.textContent = '다크 모드로 전환';
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.textContent = '화이트 모드로 전환';
            }
        }
    </script>
</body>
</html>
